<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci ! | Mejdi Sidaoui</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            padding: 50px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .icon {
            font-size: 50px;
            color: #2563eb;
            margin-bottom: 20px;
        }
        h1 { margin-bottom: 15px; font-size: 2rem; }
        p { color: #94a3b8; margin-bottom: 30px; line-height: 1.6; }
        .btn {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1>Message Envoyé !</h1>
        <p>Merci pour votre intérêt. J'ai bien reçu vos informations et je vous répondrai dans les plus brefs délais.</p>
        <a href="index.html" class="btn">Retour au portfolio</a>
    </div>
</body>
</html>
